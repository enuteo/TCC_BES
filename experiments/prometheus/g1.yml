global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: api
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - api:8080
        labels:
          service: api

  - job_name: reservation-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - reservation-service:8080
        labels:
          service: reservation-service

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080
