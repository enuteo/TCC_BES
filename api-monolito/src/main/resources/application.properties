spring.application.name=api-monolito

# Database Configuration
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/tcc_bes_db}
spring.datasource.username=${DATABASE_USERNAME:tcc_bes}
spring.datasource.password=${DATABASE_PASSWORD:tcc_bes}

# JDBC Configuration
spring.jdbc.template.query-timeout=30
spring.sql.init.mode=never
spring.flyway.enabled=true

# Logging Configuration
logging.pattern.level=%5p [correlationId:%X{correlationId:-}]

# Actuator Configuration
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.endpoint.prometheus.enabled=true
management.prometheus.metrics.export.enabled=true
management.metrics.tags.group=${APP_EXPERIMENT_GROUP:G0}
management.metrics.tags.application=${spring.application.name}
management.metrics.tags.role=${APP_EXPERIMENT_ROLE:monolith}

# Application Security
app.security.jwt-secret=${APP_JWT_SECRET:dev-jwt-secret-change-me-with-at-least-32-bytes}
app.security.jwt-expiration-seconds=${APP_JWT_EXPIRATION_SECONDS:3600}
app.security.encryption-secret=${APP_ENCRYPTION_SECRET:dev-encryption-secret-change-me-32-bytes}
app.security.entry-token-bytes=${APP_ENTRY_TOKEN_BYTES:32}
app.internal.token=${APP_INTERNAL_TOKEN:dev-internal-token-change-me-with-at-least-32-bytes}
app.internal.identity.base-url=${APP_INTERNAL_IDENTITY_BASE_URL:http://localhost:8080}
app.internal.waiting-room.base-url=${APP_INTERNAL_WAITING_ROOM_BASE_URL:http://localhost:8080}
app.internal.reservation.base-url=${APP_INTERNAL_RESERVATION_BASE_URL:http://localhost:8080}
app.internal.queue-management.base-url=${APP_INTERNAL_QUEUE_MANAGEMENT_BASE_URL:http://localhost:8080}

# Runtime roles. Defaults keep the G0 modular monolith fully local.
app.public-api.enabled=${APP_PUBLIC_API_ENABLED:true}
app.internal-api.enabled=${APP_INTERNAL_API_ENABLED:false}
app.module.identity.enabled=${APP_MODULE_IDENTITY_ENABLED:true}
app.module.waiting-room.enabled=${APP_MODULE_WAITING_ROOM_ENABLED:true}
app.module.queue-management.enabled=${APP_MODULE_QUEUE_MANAGEMENT_ENABLED:true}
app.module.reservation.enabled=${APP_MODULE_RESERVATION_ENABLED:true}
app.adapters.identity.mode=${APP_IDENTITY_ADAPTER_MODE:local}
app.adapters.waiting-room.mode=${APP_WAITING_ROOM_ADAPTER_MODE:local}
app.adapters.reservation.mode=${APP_RESERVATION_ADAPTER_MODE:local}
app.adapters.queue-management.mode=${APP_QUEUE_MANAGEMENT_ADAPTER_MODE:local}

# Bootstrap manager for local/dev experiments. Override in real runs.
app.bootstrap.manager.enabled=${APP_BOOTSTRAP_MANAGER_ENABLED:true}
app.bootstrap.manager.username=${APP_BOOTSTRAP_MANAGER_USERNAME:admin}
app.bootstrap.manager.password=${APP_BOOTSTRAP_MANAGER_PASSWORD:admin123}
app.bootstrap.manager.display-name=${APP_BOOTSTRAP_MANAGER_DISPLAY_NAME:Admin}

# Jobs
app.jobs.worker.enabled=${APP_WORKER_ENABLED:true}
app.jobs.worker.fixed-delay-ms=${APP_WORKER_FIXED_DELAY_MS:1000}
app.jobs.expiration.enabled=${APP_EXPIRATION_ENABLED:true}
app.jobs.expiration.fixed-delay-ms=${APP_EXPIRATION_FIXED_DELAY_MS:1000}
